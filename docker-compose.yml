version: '3.8'

services:
  # Flowfull Python Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowfull-python
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://flowfull:flowfull@postgres:5432/flowfull_db
      - REDIS_URL=redis://redis:6379
      - FLOWLESS_API_URL=${FLOWLESS_API_URL:-http://localhost:3000}
      - BRIDGE_VALIDATION_SECRET=${BRIDGE_VALIDATION_SECRET}
      - CACHE_ENABLED=true
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      - postgres
      - redis
    networks:
      - flowfull-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: flowfull-postgres
    environment:
      - POSTGRES_USER=flowfull
      - POSTGRES_PASSWORD=flowfull
      - POSTGRES_DB=flowfull_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowfull-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowfull"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: flowfull-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flowfull-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  flowfull-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

